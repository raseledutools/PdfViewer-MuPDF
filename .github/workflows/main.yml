name: Build PdfViewer APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Gradle (with dependency + build cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      # FIX: app/build.gradle.kts declares light/full product flavors
      # (mirroring RasFocus-final) — MuPDF itself is scoped to
      # "fullImplementation" only. Plain `assembleRelease` with flavors
      # declared becomes a lifecycle task that tries to build EVERY flavor's
      # release variant, and the output path below (apk/release/*.apk)
      # never matches the real flavor-qualified paths
      # (apk/full/release/*.apk, apk/light/release/*.apk) either way.
      # Building assembleFullRelease specifically — matching RasFocus-final's
      # own working CI job — is what actually contains MuPDF.
      - name: Build Full Release APK (with MuPDF)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleFullRelease --build-cache --parallel 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}
          exit $BUILD_EXIT

      - name: On failure — commit error_log.txt to repo (readable by Claude)
        if: failure()
        run: |
          # Extract only the actual compiler errors — no noise
          grep -E "^e: |^error:|Unresolved reference|Cannot find|None of the following|Conflicting|Redeclaration|Unresolved|FAILED|BUILD FAILED" /tmp/build.log > /tmp/error_log.txt || true
          echo "" >> /tmp/error_log.txt
          echo "=== Last 40 lines ===" >> /tmp/build.log
          tail -40 /tmp/build.log >> /tmp/error_log.txt

          cp /tmp/error_log.txt error_log.txt

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add error_log.txt
          git diff --cached --quiet && echo "No change" || git commit -m "ci: update error_log.txt [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:main || true

      - name: Debug — list generated APKs
        run: find app/build/outputs/apk -name "*.apk" -print

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PdfViewer-full-release
          path: app/build/outputs/apk/full/release/*.apk
          retention-days: 30

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: PdfViewer v1.0.${{ github.run_number }}
          files: app/build/outputs/apk/full/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
