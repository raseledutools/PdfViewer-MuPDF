name: Build & Release RasFocus APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set up Gradle (with dependency + build cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Build Full Release APK (universal + split)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleFullRelease --build-cache --parallel --info 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}
          exit $BUILD_EXIT

      - name: On failure — commit error_log.txt to repo
        if: failure()
        run: |
          {
            echo "=== KOTLIN/KAPT ERRORS ==="
            grep -E "^e: " /tmp/build.log || true
            echo ""
            echo "=== UNRESOLVED / TYPE ERRORS ==="
            grep -E "Unresolved reference|Cannot find|None of the following|Type mismatch|Overload resolution|Not enough information|Property delegate" /tmp/build.log || true
            echo ""
            echo "=== KAPT / MODULE ERRORS ==="
            grep -E "Could not load module|kaptGenerateStubs|kapt error|annotation processing|Compilation error" /tmp/build.log || true
            echo ""
            echo "=== BUILD FAILURE ==="
            grep -E "FAILED|BUILD FAILED|What went wrong|Execution failed" /tmp/build.log || true
            echo ""
            echo "=== LAST 50 LINES ==="
            tail -50 /tmp/build.log
          } > /tmp/error_log.txt 2>&1 || true

          cp /tmp/error_log.txt error_log.txt

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add error_log.txt
          git diff --cached --quiet && echo "No change" || git commit -m "ci: update error_log.txt [skip ci]"
          git pull --rebase origin ${{ github.ref_name }} || true
          git push origin HEAD:main || true

      - name: Debug — list generated APKs
        run: find app/build/outputs/apk -name "*.apk" -print

      - name: Rename APKs for clarity
        run: |
          TAG="v1.0.${{ github.run_number }}"
          APK_DIR="app/build/outputs/apk/full/release"
          # universal APK rename
          UNIVERSAL=$(find "$APK_DIR" -name "*universal*.apk" | head -1)
          if [ -n "$UNIVERSAL" ]; then
            cp "$UNIVERSAL" "$APK_DIR/RasFocus_${TAG}_universal.apk"
          fi
          # split APK rename (armeabi-v7a)
          SPLIT=$(find "$APK_DIR" -name "*.apk" ! -name "*universal*" | head -1)
          if [ -n "$SPLIT" ]; then
            cp "$SPLIT" "$APK_DIR/RasFocus_${TAG}_armeabi-v7a.apk"
          fi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RasFocus-full-release-${{ github.run_number }}
          path: |
            app/build/outputs/apk/full/release/RasFocus_*.apk
          retention-days: 30

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: RasFocus v1.0.${{ github.run_number }}
          files: |
            app/build/outputs/apk/full/release/RasFocus_*_universal.apk
            app/build/outputs/apk/full/release/RasFocus_*_armeabi-v7a.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
